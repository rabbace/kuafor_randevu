name: Build Android AAB (Play Store)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Keystore'u GitHub Secret'tan decode et
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build signed release AAB
        working-directory: mobile/android
        env:
          KEYSTORE_PATH: app/release.keystore
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          ./gradlew bundleRelease --no-daemon \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: kuafor-randevu-release-aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Ayrıca test için imzasız APK da üret
      - name: Build release APK (test için)
        working-directory: mobile/android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kuafor-randevu-release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
