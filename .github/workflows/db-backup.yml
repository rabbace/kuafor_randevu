# Haftalık veritabanı yedeği: Supabase free tier'da otomatik yedek/PITR yok.
# Bu workflow her pazartesi 03:00 UTC'de pg_dump alır ve 90 gün saklanan
# artifact olarak yükler. Gerekli secret: SUPABASE_DB_URL
# (Supabase Dashboard -> Project Settings -> Database -> Connection string / URI)
name: Weekly DB Backup

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q postgresql-client

      - name: Dump database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "SUPABASE_DB_URL secret tanımlı değil"; exit 1
          fi
          pg_dump "$DB_URL" \
            --no-owner --no-privileges \
            --schema=public \
            -f backup_$(date +%Y%m%d).sql
          gzip backup_*.sql
          ls -lh backup_*

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: backup_*.sql.gz
          retention-days: 90
